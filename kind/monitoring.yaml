kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: monitoring
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30090
    hostPort: 9090
    listenAddress: "0.0.0.0"
    protocol: TCP
  - containerPort: 30030
    hostPort: 3000
    listenAddress: "0.0.0.0"
    protocol: TCP
  - containerPort: 30100
    hostPort: 3100
    listenAddress: "0.0.0.0"
    protocol: TCP
