apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit-collector
    targetRevision: 1.0.2
    helm:
      values: |
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m

        config:
          service:
            log_level: info
            http_listen: 0.0.0.0

          pipeline:
            inputs:
              - name: tail
                tag: kube.*
                path: /var/log/containers/*.log
                parser: docker
                db: /var/log/fluentbit_kube.db
                mem_buf_limit: 5MB
                skip_long_lines: true
                refresh_interval: 10

            filters:
              - name: kubernetes
                match: "kube.*"
                kube_url: https://kubernetes.default.svc:443
                kube_ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                kube_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                kube_tag_prefix: kube.var.log.containers.
                merge_log: true
                keep_log: false
                k8s-logging.parser: true
                k8s-logging.exclude: true
                kube_meta_cache_ttl: 3600

              - name: grep
                match: "kube.*"
                regex: "$kubernetes['namespace_name'] ^(homelab|homelab-demo)$"

            outputs:
              - name: kafka
                match: "kube.*"
                brokers: homelab-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
                topics: logs
                timestamp_key: "@timestamp"
                retry_limit: false
                rdkafka.log.connection.close: false
                rdkafka.request.required.acks: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true