apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-http
  namespace: monitoring
spec:
  entryPoints:
  - web
  routes:
  - kind: Rule
    match: Host(`grafana.chammanganti.dev`)
    middlewares:
    - name: grafana-redirect-https
    services:
    - name: kube-prometheus-stack-grafana
      port: 80
