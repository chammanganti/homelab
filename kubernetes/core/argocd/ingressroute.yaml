apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.chammanganti.dev`)
      priority: 10
      services:
        - name: argocd-server
          port: 443
          scheme: https
          serversTransport: argocd-transport
    - kind: Rule
      match: Host(`argocd.chammanganti.dev`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      services:
        - name: argocd-server
          port: 443
          scheme: h2c
  tls:
    secretName: argocd-tls